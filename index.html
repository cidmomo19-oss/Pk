<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Asupan DxD</title>
    <meta name="theme-color" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/ds48hvZK/IMG-20260205-WA0018.jpg" sizes="192x192" type="image/png">
    <meta property="og:type" content="video.other" />
    <meta property="og:title" content="Asupan DxD" />
    <meta property="og:description" content="Nonton Video" />
    <meta property="og:image" content="https://i.ibb.co.com/ds48hvZK/IMG-20260205-WA0018.jpg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #fff; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="root" class="flex flex-col min-h-screen">
        <header class="pt-3 pb-3 lg:pt-4 lg:pb-4">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center">
                        <span class="font-semibold text-[26px] tracking-[-2px] text-gray-900">videy</span>
                    </a>
                    <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                        <span>Upload</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- HALAMAN ADMIN (Tersembunyi dari publik) -->
        <main id="admin-page" class="w-full max-w-[720px] mx-auto flex-grow px-4 md:mt-3 hidden">
            <div class="w-full bg-gray-50 border border-gray-200 p-6 rounded-[8px] shadow-sm">
                <h2 class="text-xl font-bold mb-4 text-gray-900">Buat Link Video Acak</h2>
                <form id="admin-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Link Video / Embed Penuh</label>
                        <input type="url" id="videoUrl" required class="w-full rounded-md border-gray-300 shadow-sm p-3 border focus:outline-none focus:ring-2 focus:ring-gray-900" placeholder="https://d000d.com/e/....">
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-gray-900 text-white font-semibold py-3 rounded-md hover:bg-gray-800 transition-colors">Generate Kode</button>
                </form>
                <div id="result" class="mt-5 text-sm text-center"></div>
            </div>
        </main>

        <!-- HALAMAN PLAYER (Desain Asli) -->
        <main id="player-page" class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3">
            <div class="w-full flex justify-center">
                <div class="w-full overflow-hidden md:rounded-[8px] shadow-lg">
                    <div class="video-container" id="player-container">
                        <div class="flex items-center justify-center h-full text-white text-sm absolute inset-0 bg-black" id="status-text">
                            Menunggu parameter URL...
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full flex flex-col items-center mt-4 mb-12">
                <button onclick="shareVideo()" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 text-secondary-foreground shadow-sm h-9 py-2 rounded-full px-6 gap-2 bg-gray-100 hover:bg-gray-200 font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share w-[18px] h-[18px]">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" x2="12" y1="2" y2="15"></line>
                    </svg>
                    Share video
                </button>
            </div>
        </main>

        <footer class="pb-6">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-center space-x-8">
                    <a href="#" class="text-xs text-gray-400 hover:text-gray-900 transition-colors">Terms of Service</a>
                    <a href="#" class="text-xs text-gray-400 hover:text-gray-900 transition-colors">Report Abuse</a>
                </div>
            </div>
        </footer>
    </div>
    
    <script>
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Asupan DxD',
                artist: 'Jangan lupa mandi',
                artwork:[{ src: 'https://i.ibb.co.com/ds48hvZK/IMG-20260205-WA0018.jpg', sizes: '512x512', type: 'image/png' }]
            });
        }
    </script>
    
    <script>
        window.onload = function() {
            const container = document.getElementById('player-container');
            const statusText = document.getElementById('status-text');
            const path = window.location.pathname;

            // Logika Routing
            if (path === '/admin') {
                document.getElementById('player-page').classList.add('hidden');
                document.getElementById('admin-page').classList.remove('hidden');
            } else if (path !== '/' && path.length > 1) {
                const code = path.substring(1); 
                statusText.innerText = 'Memuat video...';
                loadVideo(code, container);
            } else {
                container.innerHTML = `<div class='flex flex-col items-center justify-center h-full text-white text-sm absolute inset-0 p-4 text-center bg-black'><p class="font-semibold text-lg">Parameter Kosong</p></div>`;
            }
        };

        // Handle Submit di Halaman Admin
        document.getElementById('admin-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const resultDiv = document.getElementById('result');
            const videoUrl = document.getElementById('videoUrl').value;

            btn.innerText = 'Memproses...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl })
                });

                if (!res.ok) throw new Error('Gagal');
                const data = await res.json();
                
                resultDiv.innerHTML = `
                    <div class="p-3 bg-gray-100 border border-gray-300 rounded-md">
                        <p class="text-gray-900 font-semibold mb-2">Link berhasil dibuat:</p>
                        <input type="text" value="${data.shortlink}" readonly class="w-full text-center p-2 border rounded-md bg-white cursor-pointer font-medium text-gray-800" onclick="this.select(); document.execCommand('copy'); alert('Link disalin!')" />
                    </div>
                `;
                document.getElementById('videoUrl').value = '';
            } catch (err) {
                resultDiv.innerHTML = '<p class="text-red-500 font-semibold">Gagal terhubung ke KV.</p>';
            }

            btn.innerText = 'Generate Kode';
            btn.disabled = false;
        });

        // Load API Video dari KV
        async function loadVideo(code, container) {
            try {
                const res = await fetch('/api/get/' + code);
                if (!res.ok) throw new Error('Not Found');
                
                const data = await res.json();
                renderPlayer(data.url, container);
            } catch (err) {
                container.innerHTML = `<div class='flex flex-col items-center justify-center h-full text-white text-sm absolute inset-0 p-4 text-center bg-black'><p class="font-semibold text-lg">Video tidak ditemukan</p></div>`;
            }
        }

        // Render Iframe / Video asli
        function renderPlayer(url, container) {
            const lowerUrl = url.toLowerCase();

            if (lowerUrl.includes('.m3u8')) {
                container.innerHTML = '<video id="hls-player" controls playsinline style="width:100%; height:100%;"></video>';
                const video = document.getElementById('hls-player');
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                }
            } 
            else if (lowerUrl.includes('.mp4')) {
                container.innerHTML = `<video controls playsinline src="${url}" style="width:100%; height:100%;"></video>`;
            } 
            else {
                // Untuk d000d, hgcloud, dan provider lainnya
                let sandboxAttr = "";
                if (lowerUrl.includes('turbovidhls.com') || lowerUrl.includes('rubyvidhub.com')) {
                    sandboxAttr = 'sandbox="allow-scripts allow-same-origin allow-presentation"';
                }
                container.innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" scrolling="no" allowfullscreen="true" referrerpolicy="unsafe-url" ${sandboxAttr}></iframe>`;
            }
        }

        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Asupan DxD',
                    url: window.location.href
                }).catch(console.error);
            } else {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert("Link berhasil disalin!");
            }
        }
    </script>
</body>
</html>
